    <h1 class="site-title">Cronometro Online</h1>

    <main class="app" aria-label="Cronômetro online">
      <section class="timer-card">
        <div class="timer-display" aria-live="polite" aria-atomic="true">
          <span id="minutes">00</span>
          <span class="timer-display__separator">:</span>
          <span id="seconds">00</span>

          <button
            class="btn btn--secondary"
            id="pauseButton"
            type="button"
            disabled
          >
            Pausar
          </button>
          <button class="btn btn--ghost" id="resetButton" type="button">
            Reiniciar
          </button>
        </div>
      </section>
