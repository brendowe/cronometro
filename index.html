          },
          {

            "mainEntity": [

                }
              },
              {

                  "text": "Escolha o tempo total de foco, duração da sessão de estudo e pausa. O sistema alterna automaticamente entre estudo e descanso até completar a meta."

  <body>
    <header>
      <h1 class="site-title">Cronometro Online</h1>
    </header>
    <main class="app" aria-label="Relógios online">
      <section class="timer-card">
        <nav class="tab-nav" aria-label="Modos">
          <button
            class="tab-nav__button is-active"
            type="button"
            data-tab="stopwatch"
            aria-selected="true"
          >
            Cronômetro
          </button>
          <button
            class="tab-nav__button"
            type="button"
            data-tab="timer"
            aria-selected="false"
          >
            Temporizador
          </button>
          <button
            class="tab-nav__button"
            type="button"
            data-tab="pomodoro"
            aria-selected="false"
          >
            Pomodoro
          </button>
        </nav>

        <section class="mode-panel is-active" id="panel-stopwatch">
          <div class="timer-display" aria-live="polite" aria-atomic="true">
            <span id="minutes">00</span>
            <span class="timer-display__separator">:</span>
            <span id="seconds">00</span>
            <span class="timer-display__separator">.</span>
            <span id="milliseconds">00</span>
          </div>

          <div class="controls">
            <button class="btn btn--primary" id="startButton" type="button">
              Iniciar
            </button>
            <button
              class="btn btn--secondary"
              id="pauseButton"
              type="button"
              disabled
            >
              Pausar
            </button>
            <button class="btn btn--ghost" id="resetButton" type="button">
              Reiniciar
            </button>
          </div>
        </section>

        <section class="mode-panel" id="panel-timer">
          <div class="input-grid" aria-label="Tempo do temporizador">
            <label class="field-label" for="timerHours">
              Horas
              <span class="stepper">
                <input
                  id="timerHours"
                  class="field-input field-input--stepper"
                  type="number"
                  min="0"
                  max="99"
                  value="0"
                />
                <span class="stepper__buttons" aria-hidden="true">
                  <button
                    class="stepper__button"
                    type="button"
                    data-target="timerHours"
                    data-step="1"
                    aria-label="Aumentar horas"
                  >
                    ▲
                  </button>
                  <button
                    class="stepper__button"
                    type="button"
                    data-target="timerHours"
                    data-step="-1"
                    aria-label="Diminuir horas"
                  >
                    ▼
                  </button>
                </span>
              </span>
            </label>
            <label class="field-label" for="timerMinutes">
              Minutos
              <span class="stepper">
                <input
                  id="timerMinutes"
                  class="field-input field-input--stepper"
                  type="number"
                  min="0"
                  max="59"
                  value="5"
                />
                <span class="stepper__buttons" aria-hidden="true">
                  <button
                    class="stepper__button"
                    type="button"
                    data-target="timerMinutes"
                    data-step="1"
                    aria-label="Aumentar minutos"
                  >
                    ▲
                  </button>
                  <button
                    class="stepper__button"
                    type="button"
                    data-target="timerMinutes"
                    data-step="-1"
                    aria-label="Diminuir minutos"
                  >
                    ▼
                  </button>
                </span>
              </span>
            </label>
            <label class="field-label" for="timerSeconds">
              Segundos
              <span class="stepper">
                <input
                  id="timerSeconds"
                  class="field-input field-input--stepper"
                  type="number"
                  min="0"
                  max="59"
                  value="0"
                />
                <span class="stepper__buttons" aria-hidden="true">
                  <button
                    class="stepper__button"
                    type="button"
                    data-target="timerSeconds"
                    data-step="1"
                    aria-label="Aumentar segundos"
                  >
                    ▲
                  </button>
                  <button
                    class="stepper__button"
                    type="button"
                    data-target="timerSeconds"
                    data-step="-1"
                    aria-label="Diminuir segundos"
                  >
                    ▼
                  </button>
                </span>
              </span>
            </label>
          </div>

          <div
            class="countdown-display countdown-display--split"
            aria-live="polite"
            aria-atomic="true"
          >
            <span id="timerHoursDisplay">00</span>
            <span class="timer-display__separator">:</span>
            <span id="timerMinutesDisplay">05</span>
            <span class="timer-display__separator">:</span>
            <span id="timerSecondsDisplay">00</span>
          </div>

          <p class="status-text" id="timerStatus">Defina o tempo e inicie.</p>

          <div class="controls">
            <button
              class="btn btn--primary"
              id="timerStartButton"
              type="button"
            >
              Iniciar
            </button>
            <button
              class="btn btn--secondary"
              id="timerPauseButton"
              type="button"
              disabled
            >
              Pausar
            </button>
            <button class="btn btn--ghost" id="timerResetButton" type="button">
              Reiniciar
            </button>
          </div>
        </section>

        <section class="mode-panel" id="panel-pomodoro">
          <div
            class="input-grid input-grid--pomodoro"
            aria-label="Configuração do pomodoro"
          >
            <label class="field-label" for="pomoTotalHours">
              Foco total (horas)
              <span class="stepper">
                <input
                  id="pomoTotalHours"
                  class="field-input field-input--stepper"
                  type="number"
                  min="0"
                  max="24"
                  value="2"
                />
                <span class="stepper__buttons" aria-hidden="true">
                  <button
                    class="stepper__button"
                    type="button"
                    data-target="pomoTotalHours"
                    data-step="1"
                    aria-label="Aumentar foco total em horas"
                  >
                    ▲
                  </button>
                  <button
                    class="stepper__button"
                    type="button"
                    data-target="pomoTotalHours"
                    data-step="-1"
                    aria-label="Diminuir foco total em horas"
                  >
                    ▼
                  </button>
                </span>
              </span>
            </label>
            <label class="field-label" for="pomoTotalMinutes">
              Foco total (minutos)
              <span class="stepper">
                <input
                  id="pomoTotalMinutes"
                  class="field-input field-input--stepper"
                  type="number"
                  min="0"
                  max="59"
                  value="0"
                />
                <span class="stepper__buttons" aria-hidden="true">
                  <button
                    class="stepper__button"
                    type="button"
                    data-target="pomoTotalMinutes"
                    data-step="1"
                    aria-label="Aumentar foco total em minutos"
                  >
                    ▲
                  </button>
                  <button
                    class="stepper__button"
                    type="button"
                    data-target="pomoTotalMinutes"
                    data-step="-1"
                    aria-label="Diminuir foco total em minutos"
                  >
                    ▼
                  </button>
                </span>
              </span>
            </label>
          </div>

          <div class="option-row" aria-label="Sessão de estudo">
            <span class="option-row__label">Sessão</span>
            <div class="option-buttons" id="pomoStudyOptions">
              <button class="option-btn" type="button" data-study="20">
                20 min
              </button>
              <button
                class="option-btn is-active"
                type="button"
                data-study="25"
              >
                25 min
              </button>
              <button class="option-btn" type="button" data-study="30">
                30 min
              </button>
              <button class="option-btn" type="button" data-study="40">
                40 min
              </button>
              <button class="option-btn" type="button" data-study="50">
                50 min
              </button>
              <button class="option-btn" type="button" data-study="60">
                1 hora
              </button>
            </div>
          </div>

          <div class="option-row" aria-label="Sessão de pausa">
            <span class="option-row__label">Descanso</span>
            <div class="option-buttons" id="pomoBreakOptions">
              <button class="option-btn is-active" type="button" data-break="5">
                5 min
              </button>
              <button class="option-btn" type="button" data-break="10">
                10 min
              </button>
            </div>
          </div>

          <div
            class="countdown-display countdown-display--split"
            aria-live="polite"
            aria-atomic="true"
          >
            <span id="pomoHoursDisplay">00</span>
            <span class="timer-display__separator">:</span>
            <span id="pomoMinutesDisplay">25</span>
            <span class="timer-display__separator">:</span>
            <span id="pomoSecondsDisplay">00</span>
          </div>

          <p class="status-text" id="pomoStatus">Pronto para iniciar o foco.</p>
          <p class="status-text status-text--muted" id="pomoProgress">
            Foco concluído: 00:00 / 02:00
          </p>

          <div class="controls">
            <button class="btn btn--primary" id="pomoStartButton" type="button">
              Iniciar
            </button>
            <button
              class="btn btn--secondary"
              id="pomoPauseButton"
              type="button"
              disabled
            >
              Pausar
            </button>
            <button class="btn btn--ghost" id="pomoResetButton" type="button">
              Reiniciar
            </button>
          </div>
        </section>
      </section>
    </main>

    <script src="js/stopwatch.js" defer></script>
    <script src="js/app.js" defer></script>
  </body>
</html>
